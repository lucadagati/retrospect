apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: devices.wasmbed.github.io
spec:
  group: wasmbed.github.io
  versions:
  - name: v0
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              publicKey:
                type: string
            required: ["publicKey"]
          status:
            type: object
            properties:
              phase:
                type: string
                enum: ["Pending", "Enrolling", "Enrolled", "Connected", "Disconnected", "Unreachable"]
                default: "Pending"
              gateway:
                type: object
                nullable: true
              connectedSince:
                type: string
                format: date-time
                nullable: true
              lastHeartbeat:
                type: string
                format: date-time
                nullable: true
              pairingMode:
                type: boolean
                default: false
  scope: Namespaced
  names:
    plural: devices
    singular: device
    kind: Device
    shortNames:
    - dev
